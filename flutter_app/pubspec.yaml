name: legado_flutter
description: "Legado Android 与 iOS 共用的 Flutter 重写工程。"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: 3.11.3

dependencies:
  archive: ^4.0.9
  crypto: ^3.0.7
  dio: ^5.10.0
  enough_convert: ^1.6.0
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  html: ^0.15.6
  json_path: ^0.9.0
  jsf: ^1.1.0
  mobile_scanner: ^7.2.0
  path: ^1.9.1
  pdfx: ^2.9.2
  # Flutter 3.41.5 当前内置 Dart 3.11.3，固定到仍兼容该 SDK 的版本。
  sqflite: 2.4.2
  xpath_selector: ^3.0.2
  xpath_selector_html_parser: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
